spring:
  application:
    name: holodos-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/holodos
    username: holodos
    password: holodos
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    cache-names:
      - storage-places
      - units
      - categories
      - stores
      - products

server:
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /swagger-ui.html

holodos:
  api:
    default-page-size: 20
    max-page-size: 100
  media:
    root-path: ${java.io.tmpdir}/holodos-media
    # To use MinIO (S3-compatible) instead of filesystem, uncomment:
    # provider: S3
    # s3:
    #   bucket: holodos-media
    #   access-key: holodos
    #   secret-key: holodos123
    #   region: us-east-1
    #   endpoint: http://localhost:9000
    #   path-style-access: true
