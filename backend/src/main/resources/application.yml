spring:
  application:
    name: holodos-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/holodos
    username: holodos
    password: holodos
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    cache-names:
      - storage-places
      - units
      - categories
      - stores
      - products
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile

server:
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /swagger-ui.html

holodos:
  security:
    allowed-emails:
      - zavgorodniy@gmail.com
      - podshybyakina@gmail.com
  api:
    default-page-size: 20
    max-page-size: 100
  cors:
    allowed-origins: "${HOLODOS_CORS_ALLOWED_ORIGINS:http://localhost:*}"
  media:
    root-path: "${HOLODOS_MEDIA_PATH:${java.io.tmpdir}/holodos-media}"
  integrations:
    google-tasks:
      client-id: ${GOOGLE_TASKS_CLIENT_ID:}
      client-secret: ${GOOGLE_TASKS_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_TASKS_REDIRECT_URI:http://localhost:8080/api/integrations/google-tasks/oauth2/callback}
    # To use MinIO (S3-compatible) instead of filesystem, uncomment:
    # provider: S3
    # s3:
    #   bucket: holodos-media
    #   access-key: holodos
    #   secret-key: holodos123
    #   region: us-east-1
    #   endpoint: http://localhost:9000
    #   path-style-access: true
