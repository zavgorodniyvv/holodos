<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holodos Admin</title>
    <style>
        *, *:before, *:after { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; font-family: -apple-system, Helvetica, sans-serif; font-size: 14px; background: #f8fafc; }
        body { display: -webkit-flex; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 220px; -webkit-flex-shrink: 0; flex-shrink: 0; background: #1e293b; color: #cbd5e1; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; }
        .sidebar-brand { padding: 16px; font-size: 15px; font-weight: 700; color: #f1f5f9; border-bottom: 1px solid #334155; }
        .sidebar-brand span { color: #38bdf8; }
        .sidebar nav { margin-top: 8px; }
        .sidebar nav a { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; padding: 10px 16px; color: #94a3b8; text-decoration: none; font-size: 13px; }
        .sidebar nav a .ico { width: 22px; margin-right: 6px; }
        .sidebar nav a:hover { background: #334155; color: #f1f5f9; }
        .sidebar nav a.active { background: #0369a1; color: #fff; }

        /* Main */
        .main { -webkit-flex: 1; flex: 1; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; overflow: hidden; }
        .topbar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 24px; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: space-between; justify-content: space-between; -webkit-flex-shrink: 0; flex-shrink: 0; }
        .topbar h5 { margin: 0; font-weight: 600; font-size: 15px; color: #1e293b; }
        .topbar-right { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; }
        .topbar-right > * { margin-left: 8px; }
        .content { -webkit-flex: 1; flex: 1; overflow-y: auto; padding: 20px 24px; -webkit-overflow-scrolling: touch; }

        /* Buttons */
        .btn { display: inline-block; padding: 6px 14px; font-size: 13px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; text-align: center; white-space: nowrap; -webkit-appearance: none; }
        .btn-primary { background: #0369a1; color: #fff; border-color: #0369a1; }
        .btn-primary:hover { background: #0284c7; }
        .btn-secondary { background: #64748b; color: #fff; border-color: #64748b; }
        .btn-sm { padding: 3px 8px; font-size: 12px; }
        .btn-outline-edit { background: #fff; color: #0369a1; border-color: #0369a1; }
        .btn-outline-edit:hover { background: #0369a1; color: #fff; }
        .btn-outline-del { background: #fff; color: #dc2626; border-color: #dc2626; }
        .btn-outline-del:hover { background: #dc2626; color: #fff; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Search */
        .search-group { display: -webkit-flex; display: flex; }
        .search-group input { padding: 5px 10px; border: 1px solid #cbd5e1; border-right: none; border-radius: 4px 0 0 4px; font-size: 13px; width: 200px; }
        .search-group button { border-radius: 0 4px 4px 0; }

        /* Table */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        th { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #64748b; font-weight: 600; padding: 10px 12px; background: #f8fafc; border-bottom: 2px solid #e2e8f0; text-align: left; }
        td { padding: 8px 12px; font-size: 13px; vertical-align: middle; border-bottom: 1px solid #f1f5f9; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }
        .td-actions { text-align: right; white-space: nowrap; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-yes { background: #dcfce7; color: #166534; }
        .badge-no  { background: #fee2e2; color: #991b1b; }
        .badge-gray { background: #e2e8f0; color: #475569; }
        code { background: #f1f5f9; padding: 1px 4px; border-radius: 3px; font-size: 12px; font-family: monospace; }
        .color-dot { display: inline-block; width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,.15); vertical-align: middle; margin-right: 4px; }
        .alert-danger { padding: 12px 16px; border-radius: 4px; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .loading-text { text-align: center; padding: 40px; color: #94a3b8; }
        .small-note { color: #64748b; font-size: 12px; margin-bottom: 8px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: rgba(0,0,0,.5); z-index: 1000; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 40px 16px; }
        .modal-overlay.open { display: block; }
        .modal-box { background: #fff; border-radius: 8px; max-width: 640px; margin: 0 auto; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
        .modal-header { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: space-between; justify-content: space-between; }
        .modal-title { font-weight: 600; font-size: 14px; }
        .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #64748b; padding: 0 4px; line-height: 1; }
        .modal-body { padding: 16px; max-height: 60vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .modal-footer { padding: 10px 16px; border-top: 1px solid #e2e8f0; display: -webkit-flex; display: flex; -webkit-justify-content: flex-end; justify-content: flex-end; }
        .modal-footer > * { margin-left: 8px; }

        /* Form */
        .form-row { display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; margin: -6px; }
        .fc { padding: 6px; }
        .fc-12 { width: 100%; }
        .fc-8  { width: 66.666%; }
        .fc-6  { width: 50%; }
        .fc-4  { width: 33.333%; }
        label.lbl { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
        input[type=text], input[type=number], select, textarea { width: 100%; padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13px; font-family: inherit; -webkit-appearance: none; }
        select { background: #fff; }
        textarea { resize: vertical; }
        .form-check { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; padding-top: 20px; }
        .form-check input { width: auto; margin-right: 8px; }
        .color-group { display: -webkit-flex; display: flex; }
        .color-group input[type=color] { width: 44px; height: 34px; padding: 2px; border: 1px solid #cbd5e1; border-right: none; border-radius: 4px 0 0 4px; cursor: pointer; }
        .color-group input[type=text] { border-radius: 0 4px 4px 0; font-family: monospace; }
        .req { color: #dc2626; }

        /* Toast */
        .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
        .toast { padding: 12px 16px; border-radius: 6px; color: #fff; font-size: 13px; margin-top: 8px; box-shadow: 0 4px 12px rgba(0,0,0,.2); max-width: 300px; }
        .toast-success { background: #166534; }
        .toast-danger  { background: #991b1b; }
        .toast-warning { background: #92400e; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">🧊 <span>Holodos</span> Admin</div>
    <nav>
        <a href="#" data-section="categories" class="active"><span class="ico">🏷</span>Категории</a>
        <a href="#" data-section="storage-places"><span class="ico">📦</span>Места хранения</a>
        <a href="#" data-section="stores"><span class="ico">🏪</span>Магазины</a>
        <a href="#" data-section="units"><span class="ico">📐</span>Единицы изм.</a>
        <a href="#" data-section="products"><span class="ico">🥤</span>Продукты</a>
    </nav>
</div>

<div class="main">
    <div class="topbar">
        <h5 id="section-title">Категории</h5>
        <div class="topbar-right">
            <div id="search-box" class="search-group" style="display:none">
                <input id="search-input" type="text" placeholder="Поиск продукта...">
                <button class="btn btn-secondary btn-sm" onclick="searchProducts()">🔍</button>
            </div>
            <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ Добавить</button>
        </div>
    </div>
    <div class="content">
        <div id="table-container"></div>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-title" id="modal-title"></div>
            <button class="modal-close" onclick="hideModal()">✕</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer">
            <button class="btn btn-secondary btn-sm" onclick="hideModal()">Отмена</button>
            <button class="btn btn-primary btn-sm" id="save-btn" onclick="saveItem()">✓ Сохранить</button>
        </div>
    </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
var API = '/api';
var currentSection = 'categories';
var editingId = null;
var currentItems = [];
var _cats = [], _units = [], _places = [], _stores = [];

// ── XHR ───────────────────────────────────────────────────────────────────────
function xhr(path, method, body) {
    return new Promise(function(resolve, reject) {
        var x = new XMLHttpRequest();
        x.open(method || 'GET', API + '/' + path, true);
        if (body !== undefined) x.setRequestHeader('Content-Type', 'application/json');
        x.onreadystatechange = function() {
            if (x.readyState !== 4) return;
            if (x.status === 204 || (method === 'DELETE' && x.status >= 200 && x.status < 300)) { resolve(null); return; }
            var d;
            try { d = JSON.parse(x.responseText); } catch(e) { d = null; }
            if (x.status >= 200 && x.status < 300) { resolve(d); }
            else { reject(new Error((d && d.message) || ('HTTP ' + x.status))); }
        };
        x.onerror = function() { reject(new Error('Нет соединения')); };
        x.send(body !== undefined ? JSON.stringify(body) : null);
    });
}

// ── Dropdowns ─────────────────────────────────────────────────────────────────
function loadDropdowns() {
    return Promise.all([xhr('categories'), xhr('units'), xhr('storage-places'), xhr('stores')])
        .then(function(r) { _cats = r[0]; _units = r[1]; _places = r[2]; _stores = r[3]; });
}
function clearDropdowns() { _cats = []; _units = []; _places = []; _stores = []; }

// ── Form value helpers (FormData.get() not available in iOS 9) ────────────────
function fVal(form, name) {
    var el = form.elements[name];
    return el ? el.value : '';
}
function fChk(form, name) {
    var el = form.elements[name];
    return el ? el.checked : false;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function colorCell(c) {
    if (!c) return '<span style="color:#94a3b8">—</span>';
    return '<span class="color-dot" style="background:' + c + '"></span><code style="font-size:11px">' + esc(c) + '</code>';
}
function boolBadge(v) {
    return v ? '<span class="badge badge-yes">Да</span>' : '<span class="badge badge-no">Нет</span>';
}
function selectOpts(items, selectedId, emptyLabel) {
    var h = '<option value="">' + emptyLabel + '</option>';
    for (var i = 0; i < items.length; i++) {
        var it = items[i];
        var extra = it.shortName ? ' (' + esc(it.shortName) + ')' : '';
        h += '<option value="' + it.id + '"' + (it.id == selectedId ? ' selected' : '') + '>' + esc(it.name) + extra + '</option>';
    }
    return h;
}

// ── Row renderers ─────────────────────────────────────────────────────────────
var DICT_COLS = ['ID', 'Название', 'Описание', 'Иконка', 'Цвет', 'Порядок', 'Активно', ''];

function dictRow(r) {
    return '<td>' + r.id + '</td>' +
        '<td><strong>' + esc(r.name) + '</strong></td>' +
        '<td style="color:#64748b">' + esc(r.description || '') + '</td>' +
        '<td>' + (r.icon ? '<span style="font-size:1.2em">' + esc(r.icon) + '</span>' : '—') + '</td>' +
        '<td>' + colorCell(r.color) + '</td>' +
        '<td>' + (r.sortOrder || 0) + '</td>' +
        '<td>' + boolBadge(r.active) + '</td>';
}

// ── Form builders ─────────────────────────────────────────────────────────────
function dictionaryForm(r) {
    return '<form id="edit-form"><div class="form-row">' +
        '<div class="fc fc-12"><label class="lbl">Название <span class="req">*</span></label>' +
            '<input type="text" name="name" value="' + esc(r.name || '') + '" required autofocus></div>' +
        '<div class="fc fc-12"><label class="lbl">Описание</label>' +
            '<input type="text" name="description" value="' + esc(r.description || '') + '"></div>' +
        '<div class="fc fc-6"><label class="lbl">Иконка (эмодзи)</label>' +
            '<input type="text" name="icon" placeholder="🥗" value="' + esc(r.icon || '') + '"></div>' +
        '<div class="fc fc-6"><label class="lbl">Цвет</label>' +
            '<div class="color-group">' +
                '<input type="color" id="cp" value="' + (r.color || '#6c757d') + '" oninput="document.getElementById(\'ch\').value=this.value">' +
                '<input type="text" id="ch" name="color" value="' + (r.color || '#6c757d') + '" maxlength="7" placeholder="#6c757d" oninput="document.getElementById(\'cp\').value=this.value">' +
            '</div></div>' +
        '<div class="fc fc-6"><label class="lbl">Порядок сортировки</label>' +
            '<input type="number" name="sortOrder" value="' + (r.sortOrder || 0) + '" min="0"></div>' +
        '<div class="fc fc-6"><div class="form-check">' +
            '<input type="checkbox" name="active" id="chkA" ' + (r.active !== false ? 'checked' : '') + '>' +
            '<label for="chkA">Активно</label></div></div>' +
    '</div></form>';
}

function buildDictBody(form) {
    return {
        name: fVal(form, 'name'),
        description: fVal(form, 'description') || null,
        icon: fVal(form, 'icon') || null,
        color: fVal(form, 'color') || null,
        sortOrder: parseInt(fVal(form, 'sortOrder')) || 0,
        active: fChk(form, 'active')
    };
}

var UNIT_TYPES = ['COUNT','WEIGHT','VOLUME','PACKAGING','OTHER'];
var UNIT_LABELS = {COUNT:'Штучная',WEIGHT:'Масса',VOLUME:'Объём',PACKAGING:'Упаковка',OTHER:'Другое'};

function unitForm(r) {
    var typeOpts = '';
    for (var i = 0; i < UNIT_TYPES.length; i++) {
        var t = UNIT_TYPES[i];
        typeOpts += '<option value="' + t + '"' + (r.unitType === t ? ' selected' : '') + '>' + UNIT_LABELS[t] + '</option>';
    }
    return '<form id="edit-form"><div class="form-row">' +
        '<div class="fc fc-4"><label class="lbl">Код <span class="req">*</span></label>' +
            '<input type="text" name="code" value="' + esc(r.code || '') + '" required autofocus style="font-family:monospace"></div>' +
        '<div class="fc fc-4"><label class="lbl">Краткое <span class="req">*</span></label>' +
            '<input type="text" name="shortName" value="' + esc(r.shortName || '') + '" required></div>' +
        '<div class="fc fc-4"><label class="lbl">Тип <span class="req">*</span></label>' +
            '<select name="unitType" required>' + typeOpts + '</select></div>' +
        '<div class="fc fc-8"><label class="lbl">Полное название <span class="req">*</span></label>' +
            '<input type="text" name="name" value="' + esc(r.name || '') + '" required></div>' +
        '<div class="fc fc-4"><div class="form-check">' +
            '<input type="checkbox" name="active" id="chkA" ' + (r.active !== false ? 'checked' : '') + '>' +
            '<label for="chkA">Активна</label></div></div>' +
    '</div></form>';
}

function productFormHtml(r) {
    return '<form id="edit-form"><div class="form-row">' +
        '<div class="fc fc-12"><label class="lbl">Название <span class="req">*</span></label>' +
            '<input type="text" name="name" value="' + esc(r.name || '') + '" required autofocus></div>' +
        '<div class="fc fc-6"><label class="lbl">Категория <span class="req">*</span></label>' +
            '<select name="categoryId" required>' + selectOpts(_cats, r.categoryId, '— выберите —') + '</select></div>' +
        '<div class="fc fc-6"><label class="lbl">Единица измерения <span class="req">*</span></label>' +
            '<select name="defaultUnitId" required>' + selectOpts(_units, r.defaultUnitId, '— выберите —') + '</select></div>' +
        '<div class="fc fc-6"><label class="lbl">Место хранения <span class="req">*</span></label>' +
            '<select name="defaultStoragePlaceId" required>' + selectOpts(_places, r.defaultStoragePlaceId, '— выберите —') + '</select></div>' +
        '<div class="fc fc-6"><label class="lbl">Магазин</label>' +
            '<select name="defaultStoreId">' + selectOpts(_stores, r.defaultStoreId, '— не выбран —') + '</select></div>' +
        '<div class="fc fc-12"><label class="lbl">Описание</label>' +
            '<textarea name="description" rows="2">' + esc(r.description || '') + '</textarea></div>' +
        '<div class="fc fc-4"><label class="lbl">Срок хранения (дней)</label>' +
            '<input type="number" name="shelfLifeDays" min="1" value="' + (r.shelfLifeDays || '') + '"></div>' +
        '<div class="fc fc-4"><label class="lbl">Мин. остаток</label>' +
            '<input type="number" step="0.001" name="minimumQuantityThreshold" value="' + (r.minimumQuantityThreshold || '') + '"></div>' +
        '<div class="fc fc-4"><label class="lbl">Кол-во дозаказа</label>' +
            '<input type="number" step="0.001" name="reorderQuantity" value="' + (r.reorderQuantity || '') + '"></div>' +
        '<div class="fc fc-6"><label class="lbl">Штрихкод</label>' +
            '<input type="text" name="barcode" value="' + esc(r.barcode || '') + '" style="font-family:monospace"></div>' +
        '<div class="fc fc-6"><label class="lbl">Заметка</label>' +
            '<input type="text" name="note" value="' + esc(r.note || '') + '"></div>' +
        '<div class="fc fc-12" style="display:-webkit-flex;display:flex">' +
            '<div class="form-check" style="margin-right:24px">' +
                '<input type="checkbox" name="autoAddShopping" id="chkAuto" ' + (r.autoAddShopping !== false ? 'checked' : '') + '>' +
                '<label for="chkAuto">Авто-добавление в список покупок</label></div>' +
            '<div class="form-check">' +
                '<input type="checkbox" name="active" id="chkA" ' + (r.active !== false ? 'checked' : '') + '>' +
                '<label for="chkA">Активен</label></div>' +
        '</div>' +
    '</div></form>';
}

function buildProductBody(form) {
    return {
        name: fVal(form,'name'),
        categoryId: parseInt(fVal(form,'categoryId')),
        defaultUnitId: parseInt(fVal(form,'defaultUnitId')),
        defaultStoragePlaceId: parseInt(fVal(form,'defaultStoragePlaceId')),
        defaultStoreId: fVal(form,'defaultStoreId') ? parseInt(fVal(form,'defaultStoreId')) : null,
        description: fVal(form,'description') || null,
        shelfLifeDays: fVal(form,'shelfLifeDays') ? parseInt(fVal(form,'shelfLifeDays')) : null,
        minimumQuantityThreshold: fVal(form,'minimumQuantityThreshold') ? parseFloat(fVal(form,'minimumQuantityThreshold')) : null,
        reorderQuantity: fVal(form,'reorderQuantity') ? parseFloat(fVal(form,'reorderQuantity')) : null,
        autoAddShopping: fChk(form,'autoAddShopping'),
        barcode: fVal(form,'barcode') || null,
        note: fVal(form,'note') || null,
        active: fChk(form,'active')
    };
}

// ── Section config ────────────────────────────────────────────────────────────
var sections = {
    categories: {
        title: 'Категории', endpoint: 'categories', columns: DICT_COLS,
        renderRow: dictRow,
        getFormHtml: function(r) { return Promise.resolve(dictionaryForm(r)); },
        buildBody: buildDictBody
    },
    'storage-places': {
        title: 'Места хранения', endpoint: 'storage-places', columns: DICT_COLS,
        renderRow: dictRow,
        getFormHtml: function(r) { return Promise.resolve(dictionaryForm(r)); },
        buildBody: buildDictBody
    },
    stores: {
        title: 'Магазины', endpoint: 'stores', columns: DICT_COLS,
        renderRow: dictRow,
        getFormHtml: function(r) { return Promise.resolve(dictionaryForm(r)); },
        buildBody: buildDictBody
    },
    units: {
        title: 'Единицы измерения', endpoint: 'units',
        columns: ['ID', 'Код', 'Название', 'Краткое', 'Тип', 'Активна', ''],
        renderRow: function(r) {
            return '<td>' + r.id + '</td><td><code>' + esc(r.code) + '</code></td><td>' + esc(r.name) + '</td>' +
                '<td>' + esc(r.shortName) + '</td><td><span class="badge badge-gray">' + r.unitType + '</span></td>' +
                '<td>' + boolBadge(r.active) + '</td>';
        },
        getFormHtml: function(r) { return Promise.resolve(unitForm(r)); },
        buildBody: function(form) {
            return { code: fVal(form,'code'), name: fVal(form,'name'), shortName: fVal(form,'shortName'), unitType: fVal(form,'unitType'), active: fChk(form,'active') };
        }
    },
    products: {
        title: 'Продукты', endpoint: 'products', paginated: true,
        columns: ['ID', 'Название', 'Категория', 'Ед. изм.', 'Место хранения', 'Магазин', 'Активен', ''],
        renderRow: function(r) {
            return '<td>' + r.id + '</td><td><strong>' + esc(r.name) + '</strong></td>' +
                '<td>' + esc(r.categoryName || '—') + '</td><td>' + esc(r.defaultUnitName || '—') + '</td>' +
                '<td>' + esc(r.defaultStoragePlaceName || '—') + '</td><td>' + esc(r.defaultStoreName || '—') + '</td>' +
                '<td>' + boolBadge(r.active) + '</td>';
        },
        getFormHtml: function(r) {
            if (_cats.length && _units.length && _places.length) return Promise.resolve(productFormHtml(r));
            return loadDropdowns().then(function() { return productFormHtml(r); });
        },
        buildBody: buildProductBody
    }
};

// ── Load section ──────────────────────────────────────────────────────────────
function loadSection(section) {
    currentSection = section;
    var cfg = sections[section];
    document.getElementById('section-title').textContent = cfg.title;

    var links = document.querySelectorAll('.sidebar nav a');
    for (var i = 0; i < links.length; i++) {
        links[i].className = links[i].getAttribute('data-section') === section ? 'active' : '';
    }

    document.getElementById('search-box').style.display = section === 'products' ? '' : 'none';
    document.getElementById('search-input').value = '';

    document.getElementById('table-container').innerHTML = '<div class="loading-text">Загрузка...</div>';

    return fetchItems(section, '').then(function(items) {
        currentItems = items;
        renderTable(section, items);
    }).catch(function(e) {
        document.getElementById('table-container').innerHTML = '<div class="alert-danger">Ошибка: ' + esc(e.message) + '</div>';
    });
}

function fetchItems(section, search) {
    var cfg = sections[section];
    if (cfg.paginated) {
        var q = search ? '&search=' + encodeURIComponent(search) : '';
        return xhr(cfg.endpoint + '?page=0&size=200' + q).then(function(d) { return d.content; });
    }
    return xhr(cfg.endpoint);
}

function renderTable(section, items) {
    var cfg = sections[section];
    var thead = '';
    for (var i = 0; i < cfg.columns.length; i++) thead += '<th>' + cfg.columns[i] + '</th>';

    var tbody = '';
    if (!items.length) {
        tbody = '<tr><td colspan="99" style="text-align:center;color:#94a3b8;padding:32px">Нет записей</td></tr>';
    } else {
        for (var j = 0; j < items.length; j++) {
            var it = items[j];
            var label = esc(it.name || it.code || it.id);
            tbody += '<tr>' + cfg.renderRow(it) +
                '<td class="td-actions">' +
                    '<button class="btn btn-outline-edit btn-sm" onclick="openEditModal(' + it.id + ')" style="margin-right:4px">✏</button>' +
                    '<button class="btn btn-outline-del btn-sm" onclick="confirmDelete(' + it.id + ',\'' + label + '\')">🗑</button>' +
                '</td></tr>';
        }
    }

    document.getElementById('table-container').innerHTML =
        '<p class="small-note">Записей: ' + items.length + '</p>' +
        '<div class="table-responsive"><table><thead><tr>' + thead + '</tr></thead><tbody>' + tbody + '</tbody></table></div>';
}

function searchProducts() {
    var q = document.getElementById('search-input').value;
    document.getElementById('table-container').innerHTML = '<div class="loading-text">Загрузка...</div>';
    fetchItems('products', q).then(function(items) {
        currentItems = items;
        renderTable('products', items);
    }).catch(function(e) { showToast('Ошибка: ' + e.message, 'danger'); });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal() { document.getElementById('editModal').className = 'modal-overlay open'; }
function hideModal() { document.getElementById('editModal').className = 'modal-overlay'; }

function openCreateModal() {
    editingId = null;
    var cfg = sections[currentSection];
    document.getElementById('modal-title').textContent = 'Добавить — ' + cfg.title;
    document.getElementById('modal-body').innerHTML = '<div class="loading-text">Загрузка...</div>';
    showModal();
    cfg.getFormHtml({}).then(function(html) {
        document.getElementById('modal-body').innerHTML = html;
    }).catch(function(e) {
        document.getElementById('modal-body').innerHTML = '<div class="alert-danger">Ошибка: ' + esc(e.message) + '</div>';
    });
}

function openEditModal(id) {
    var item = null;
    for (var i = 0; i < currentItems.length; i++) {
        if (currentItems[i].id === id) { item = currentItems[i]; break; }
    }
    if (!item) { showToast('Элемент не найден', 'warning'); return; }
    editingId = id;
    var cfg = sections[currentSection];
    document.getElementById('modal-title').textContent = 'Редактировать — ' + cfg.title;
    document.getElementById('modal-body').innerHTML = '<div class="loading-text">Загрузка...</div>';
    showModal();
    cfg.getFormHtml(item).then(function(html) {
        document.getElementById('modal-body').innerHTML = html;
    }).catch(function(e) {
        document.getElementById('modal-body').innerHTML = '<div class="alert-danger">Ошибка: ' + esc(e.message) + '</div>';
    });
}

function saveItem() {
    var formEl = document.getElementById('edit-form');
    if (!formEl) return;
    var cfg = sections[currentSection];
    var body = cfg.buildBody(formEl);
    var saveBtn = document.getElementById('save-btn');
    var eid = editingId;
    var sec = currentSection;
    saveBtn.disabled = true;

    var p = eid
        ? xhr(cfg.endpoint + '/' + eid, 'PUT', body)
        : xhr(cfg.endpoint, 'POST', body);

    p.then(function() {
        showToast(eid ? 'Изменения сохранены' : 'Запись создана', 'success');
        hideModal();
        if (sec !== 'products') clearDropdowns();
        loadSection(sec);
        saveBtn.disabled = false;
    }).catch(function(e) {
        showToast('Ошибка: ' + e.message, 'danger');
        saveBtn.disabled = false;
    });
}

function confirmDelete(id, name) {
    if (!confirm('Удалить «' + name + '»?\n\nОперация необратима.')) return;
    var cfg = sections[currentSection];
    var sec = currentSection;
    xhr(cfg.endpoint + '/' + id, 'DELETE').then(function() {
        showToast('Запись удалена', 'success');
        if (sec !== 'products') clearDropdowns();
        loadSection(sec);
    }).catch(function(e) { showToast('Ошибка: ' + e.message, 'danger'); });
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type) {
    var el = document.createElement('div');
    el.className = 'toast toast-' + (type || 'success');
    el.textContent = msg;
    document.getElementById('toastWrap').appendChild(el);
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 3000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    var links = document.querySelectorAll('.sidebar nav a');
    for (var i = 0; i < links.length; i++) {
        (function(a) {
            a.addEventListener('click', function(e) {
                e.preventDefault();
                loadSection(a.getAttribute('data-section'));
            });
        })(links[i]);
    }

    document.getElementById('search-input').addEventListener('keydown', function(e) {
        if (e.keyCode === 13) searchProducts();
    });

    document.getElementById('editModal').addEventListener('keydown', function(e) {
        if (e.keyCode === 13 && e.target.tagName !== 'TEXTAREA') saveItem();
    });

    document.getElementById('editModal').addEventListener('click', function(e) {
        if (e.target === this) hideModal();
    });

    loadSection('categories');
});
</script>
</body>
</html>
