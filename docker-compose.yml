services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: holodos
      POSTGRES_USER: holodos
      POSTGRES_PASSWORD: holodos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: holodos
      MINIO_ROOT_PASSWORD: holodos123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 holodos holodos123;
      mc mb --ignore-existing local/holodos-media;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
