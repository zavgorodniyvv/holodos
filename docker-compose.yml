services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: holodos
      POSTGRES_USER: holodos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-holodos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holodos"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/holodos
      SPRING_DATASOURCE_USERNAME: holodos
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-holodos}
      HOLODOS_MEDIA_PATH: /data/media
      HOLODOS_CORS_ALLOWED_ORIGINS: ${HOLODOS_CORS_ALLOWED_ORIGINS:-http://localhost:*}
      GOOGLE_TASKS_CLIENT_ID: ${GOOGLE_TASKS_CLIENT_ID:-}
      GOOGLE_TASKS_CLIENT_SECRET: ${GOOGLE_TASKS_CLIENT_SECRET:-}
      GOOGLE_TASKS_REDIRECT_URI: ${GOOGLE_TASKS_REDIRECT_URI:-}
    volumes:
      - media:/data/media
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  media:
