name: holodos_mobile
description: Mobile offline-first client for Holodos
publish_to: none
version: 0.1.0+1
environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.2+1
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0
  freezed_annotation: ^2.4.3
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config/
